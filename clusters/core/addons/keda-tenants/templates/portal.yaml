{{- $portalScaler := .Values.portalScaler }}
{{- range $namespace := .Values.kedaTenants.namespaces }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: portal-scaler
  namespace: {{ $namespace }}
spec:
  pollingInterval: {{ $portalScaler.pollingInterval }}
  cooldownPeriod: {{ $portalScaler.cooldownPeriod }}
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: portal
  minReplicaCount: {{ $portalScaler.minReplicaCount }}
  maxReplicaCount: {{ $portalScaler.maxReplicaCount }}
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prom-prometheus.monitoring.svc:9090
        metricName: pods_created_last_{{ $portalScaler.activityTimeInterval }}_sec
        query: |
          count(
            kube_pod_created{
              namespace="{{ $namespace }}",
              pod!~"tekton-resource-pruner.*"
            } > time() - {{ $portalScaler.activityTimeInterval }}
          ) or vector(0)
        threshold: "1"
    - type: prometheus
      metadata:
        serverAddress: http://prom-prometheus.monitoring.svc:9090
        metricName: portal_requests_last_{{ $portalScaler.requestWindow }}_sec
        query: |
          sum(
            increase(
              nginx_ingress_controller_requests{
                exported_namespace="{{ $namespace }}",
                ingress="portal",
                method!~"HEAD|OPTIONS"
              }[{{ $portalScaler.requestWindow }}s]
            )
          ) or vector(0)
        threshold: {{ $portalScaler.requestThreshold | quote }}
{{- end }}
