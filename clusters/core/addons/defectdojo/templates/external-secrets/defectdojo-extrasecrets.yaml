{{ if .Values.eso.enabled }}
{{- $secretPath := .Values.eso.secretPath }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: defectdojo-extrasecrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: {{ .Release.Name }}
  data:
    - secretKey: DD_SOCIAL_AUTH_KEYCLOAK_SECRET
      remoteRef:
        key: {{ $secretPath }}
        property: defectdojo.oidcClientSecret
{{ end }}
