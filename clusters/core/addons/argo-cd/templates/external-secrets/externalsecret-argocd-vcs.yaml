{{- if .Values.eso.enabled }}
{{- $secretPath := .Values.eso.secretPath }}
# need to create secret into aws parameter store
# update key
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-vcs
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: {{ .Release.Name }}
  data:
  - secretKey: sshPrivateKey
    remoteRef:
      key: {{ $secretPath }}
      metadataPolicy: None
      property: argocd-vcs.sshPrivateKey
      decodingStrategy: Base64
  - secretKey: url
    remoteRef:
      key: {{ $secretPath }}
      metadataPolicy: None
      property: argocd-vcs.url
  target:
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
{{- end }}
